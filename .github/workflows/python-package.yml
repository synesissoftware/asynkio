# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches:
      - master
      - dev
      - ci2
      - split
      - 'bugfix/**'
      - 'chore/**'
      - 'feature/**'
      - 'fix/**'
      - 'refactor/**'
  pull_request:
    branches:
      - master
      - dev

jobs:
  lint:
    name: Lint (ruff / black)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[dev]"

    # Committed files end with an extra blank line for vi/vim; black expects a
    # single trailing newline, so strip before --check (see .editorconfig).
    - name: Strip trailing blank lines for formatters
      run: ./scripts/strip_trailing_blank_line.sh

    - name: Lint with ruff
      run: ruff check .

    - name: Check formatting with black
      run: black --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e ".[test]"

    - name: Test with pytest
      run: pytest

